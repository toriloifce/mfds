name: DevOps CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # FASE 1: Integração Contínua (CI)
  ci-build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image (Test)
      run: |
        docker build -t todo-app-test:latest .

    - name: Run Basic Automated Test
      run: |
        # Inicia o container de teste em segundo plano na porta 8080
        docker run -d -p 8080:80 --name test-container todo-app-test:latest
        sleep 5
        
        # Faz uma chamada de teste na API para verificar se o servidor responde (HTTP 200)
        curl -f http://localhost:8080/api/tarefas
        
        # Encerra o container de teste
        docker stop test-container
        docker rm test-container

  # FASE 2: Entrega Contínua (CD) - Publicação automatizada da Imagem Docker
  cd-deploy:
    needs: ci-build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=latest
          type=sha,format=short

    - name: Build and Push Docker Image to GHCR
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}